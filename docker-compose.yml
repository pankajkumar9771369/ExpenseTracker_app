services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.4
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - 2181:2181

  kafka:
    image: confluentinc/cp-kafka:7.4.4
    depends_on:
      - zookeeper
    ports:
      - 9092:9092
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  mysql:
    image: mysql:8.3.0
    container_name: mysql
    restart: always
    environment:
      MYSQL_USER: test
      MYSQL_ROOT_USER: root
      MYSQL_PASSWORD: 'password'
      MYSQL_ROOT_PASSWORD: 'password'
    ports:
      - '3307:3306'
    expose:
      - '3306'
    volumes:
      - mysql-db:/var/lib/mysql

  userservice:
    image: user-service
    container_name: user-service
    ports:
      - '9898:9898' # userService server.port=9898
    environment:
      MYSQL_HOST: mysql
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
    depends_on:
      - kafka
      - mysql

  authservice:
    image: auth-service
    container_name: auth-service
    ports:
      - '9810:9810' # authService server.port=9810
    environment:
      MYSQL_HOST: mysql
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
    depends_on:
      - kafka
      - mysql

  expenseservice:
    image: expense-service
    container_name: expense-service
    ports:
      - '9820:9820' # expenseService server.port=9820
    environment:
      MYSQL_HOST: mysql
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
    depends_on:
      - kafka
      - mysql

  dsservice:
    image: ds-service
    container_name: ds-service
    ports:
      - '8010:8010' # dsService port=8010
    volumes:
      - ./dsService/src/app:/usr/local/lib/python3.11/site-packages/app
    environment:
      KAFKA_HOST: kafka
      KAFKA_PORT: 29092
      OPENAI_API_KEY: kOVKVbVgLFCcCamGvqgEM9XbKYj4RNxa
    depends_on:
      - kafka

  kong-service:
    image: kong
    volumes:
      - "./config:/usr/local/kong/declarative"
    environment:
      KONG_DATABASE: off
      KONG_DECLARATIVE_CONFIG: /usr/local/kong/declarative/kong.yml
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001, 0.0.0.0:8444 ssl
      KONG_LOG_LEVEL: debug
      KONG_PLUGINS: bundled
    depends_on:
      - authservice
      - userservice
    ports:
      - "8000:8000/tcp"
      - "127.0.0.1:7990:8001/tcp"
      - "8443:8443/tcp"
      - "127.0.0.1:8444:8444/tcp"

volumes:
  mysql-db:
    driver: local
